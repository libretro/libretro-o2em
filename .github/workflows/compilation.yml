name: CI

on:
  push:
  pull_request:
  repository_dispatch:
    types: [run_build]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Compile core
      run: |
        make -j$(nproc)

    - name: Build and run savestate determinism test
      run: |
        cc -O1 -g -o tests/savestate_determinism tests/savestate_determinism.c -Ilibretro-common/include -ldl
        tests/savestate_determinism ./o2em_libretro.so

    - name: Run allocation fault-injection test
      run: |
        cc -O1 -g -o tests/lifecycle tests/lifecycle.c -Ilibretro-common/include -ldl
        cc -O1 -fPIC -shared -o tests/mallocfail.so tests/mallocfail.c -ldl
        # every large allocation of the load path (there are exactly 5)
        # must produce a graceful retro_load_game failure, never kill
        # the process
        for k in 1 2 3 4 5; do
          set +e
          out=$(LD_PRELOAD=./tests/mallocfail.so MF_FAIL_NTH=$k MF_SIZE_MIN=20000 tests/lifecycle ./o2em_libretro.so soak 5)
          rc=$?
          set -e
          echo "K=$k rc=$rc: $out"
          test "$rc" -eq 2
          echo "$out" | grep -q "FAIL: retro_load_game"
        done
        # with no qualifying allocation failed, the run must pass
        LD_PRELOAD=./tests/mallocfail.so MF_FAIL_NTH=6 MF_SIZE_MIN=20000 tests/lifecycle ./o2em_libretro.so soak 5

    - name: Build core with AddressSanitizer
      run: |
        make clean
        make -j$(nproc) CC="gcc -fsanitize=address -g -O1"

    - name: Run lifecycle, reload-leak and A/V contract tests (ASan)
      run: |
        cc -O1 -g -fsanitize=address -o tests/lifecycle tests/lifecycle.c -Ilibretro-common/include -ldl
        ASAN_OPTIONS=detect_leaks=1 tests/lifecycle ./o2em_libretro.so cycles 3
        ASAN_OPTIONS=detect_leaks=1 tests/lifecycle ./o2em_libretro.so reload 4
        ASAN_OPTIONS=detect_leaks=1 tests/lifecycle ./o2em_libretro.so soak 300

  build-ps2:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest
    steps:
    - uses: actions/checkout@v2

    - name: Install dependencies
      run: |
        apk add build-base

    - name: Get Information Variables
      id: core
      run: |
        echo "::set-output name=info::$(echo o2em)"
        echo "::set-output name=platform::$(echo ps2)"
        echo "::set-output name=sha8::$(echo ${GITHUB_SHA} | cut -c1-8)"

    - name: Compile project
      run: |
        make platform=${{ steps.core.outputs.platform }} clean all

    - name: Upload artifacts
      if: ${{ success() }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.core.outputs.info }}_libretro_${{ steps.core.outputs.platform }}-${{ steps.core.outputs.sha8 }}
        path: ${{ steps.core.outputs.info }}_libretro_${{ steps.core.outputs.platform }}.a
